name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run unit tests
        run: PYTHONPATH=src python -m pytest tests/unit -q

      - name: Run contract tests
        run: PYTHONPATH=src python -m pytest tests/contract -q

      - name: Run integration tests
        run: PYTHONPATH=src python -m pytest tests/integration -q
